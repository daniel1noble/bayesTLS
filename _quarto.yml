project:
  type: book
  output-dir: _book

book:
  title: "A flexible modelling framework for estimating thermal sensitivity across life"
  author:
    - name: "Daniel W.A. Noble"
      email: daniel.noble@anu.edu.au
      affiliations:
        - ref: anu
    - name: "Pieter A. Arnold"
      affiliations:
        - ref: anu
    - name: "Patrice Pottier"
      email: patrice.pottier@bioenv.gu.se
      affiliations:
        - ref: gu
  date: today
  chapters:
    - index.qmd
    - ms/ms.qmd
    - ms/supplement.qmd

affiliations:
  - id: anu
    name: Division of Ecology and Evolution, Research School of Biology, Australian National University
    city: Canberra
    country: Australia
  - id: gu
    name: Department of Biological and Environmental Sciences, University of Gothenburg
    city: Gothenburg
    country: Sweden

format:
  html:
    toc: true
    toc-location: left
    toc-depth: 4
    number-sections: true
    embed-resources: true
    fig-cap-location: bottom
  docx:
    reference-doc: bib/templates/template.docx
    number-sections: true

bibliography: bib/tdt_problems.bib
csl: bib/ecology-letters.csl
link-citations: true

# Keep object numbers free of book chapter prefixes so main-manuscript figures,
# tables, and equations render as Figure 1, Table 1, Equation 1 rather than
# Figure 1.1, Table 1.1, Equation 1.1.
#
# Supplement figures and tables use custom float types (`suppfig-*` and
# `supptbl-*`) so Quarto can render them as Figure S1 and Table S1 using
# `space-before-numbering: false`, without a Lua relabelling filter.
crossref:
  chapters: false
  custom:
    - kind: float
      key: suppfig
      reference-prefix: "Figure S"
      caption-prefix: "Figure S"
      space-before-numbering: false
    - kind: float
      key: supptbl
      reference-prefix: "Table S"
      caption-prefix: "Table S"
      space-before-numbering: false

execute:
  echo: false
  warning: false
  message: false
  cache: true
